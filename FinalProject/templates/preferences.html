<!DOCTYPE html>
<html>
<head>
    <title>Your Account</title>
    <link rel="stylesheet" href="./static/css/styles.css">
    <link rel="stylesheet" href="./static/css/preferences.css">
    <link rel="stylesheet" href="./static/css/sidebar.css">

    <script src="/static/js/jquery-3.7.1.min.js"></script>
</head>
<body>
    <div class="sidebar">
        <a href="/">Home</a>
        <a href="/account">Account</a>
        <a href="/preferences" class="current">Preferences</a>
        <a href="/logout" >Logout</a>
    </div>
    
    <div class="preferences-form">
        <h1>Update Your Account Preferences</h1>
        <form id="preferencesForm">
            <!-- choose default location -->
            <label for="defaultLocation">Default Location (Zip Code):</label>
            <input type="text" id="defaultLocation" name="defaultLocation" value="{{ g.preferences.default_location }}" placeholder="Enter zip code">
            <br><br>

            <!-- choose default date -->
            <label for="defaultDate">Default Date:</label>
            <div id="dateOptions">
                <!-- TODO: add to this  -->
                <label><input type="radio" name="defaultDate" value="none" {{ 'checked' if not preferences.default_date or preferences.default_date.option == 'none' }}>None</label><br>
                <label><input type="radio" name="defaultDate" value="today" {{ 'checked' if preferences.default_date and preferences.default_date.option == 'today' }}>Today</label><br>
                <label><input type="radio" name="defaultDate" value="tomorrow" {{ 'checked' if preferences.default_date and preferences.default_date.option == 'tomorrow' }}> Tomorrow</label><br>
                <label><input type="radio" name="defaultDate" value="other" {{ 'checked' if preferences.default_date and preferences.default_date.option == 'other' }}>Other</label><br>
            </div>
            <input type="date" id="customDate" name="customDate" style="display: none;"><br><br>

            <!-- show weather -->
            <label for="showWeather">Display Weather Results:</label>
            <input type="checkbox" id="showWeather" name="showWeather" {{ 'checked' if g.preferences.show_weather else '' }}> <!--TODO add if no preferences saved...-->
            <span id="weatherLabel">Yes</span>
            <br><br><br>

            <!-- Language Selection -->
            <label for="language">Language:</label>
            <select id="language" name="language">
                <option value="en" {{ 'selected' if g.preferences.language == 'en' else '' }}>English</option>
                <option value="he" {{ 'selected' if g.preferences.language == 'he' else '' }}>Hebrew</option>
            </select><br><br>

            <!-- Reminder Notifications -->
            <label for="notifications">Receive Reminder Notifications:</label>
            <div id="notificationTypes">
                <label><input type="checkbox" name="notifications" value="mincha" {{ 'checked' if 'mincha' in g.preferences.notifications else '' }}> Mincha</label><br>
                <label><input type="checkbox" name="notifications" value="shkia" {{ 'checked' if 'shkia' in g.preferences.notifications else '' }}> Shkia</label><br>
                <label><input type="checkbox" name="notifications" value="maariv" {{ 'checked' if 'maariv' in g.preferences.notifications else '' }}> Maariv</label><br>
            </div>

            <button type="submit" id="savePreferences">Save Preferences</button>
        </form>
    </div>
    <script>
        $(document).ready(function() {
            $("#preferencesForm").submit(function(event) {
                event.preventDefault();
                // TODO: add code to deal with user not making any changes when updating

                var defaultDate = getDefaultDateSelection();
                var defaultLocation = $("#defaultLocation").val();
                var showWeather = $("#showWeather").prop('checked');
                var language = $("#language").val();
                var notifications = getNotificationSelection();
                
                $.ajax({
                    url: '/update_preferences',
                    type: 'POST',
                    contentType: 'application/json', 
                    accept: 'application/json',
                    data: JSON.stringify({
                        defaultLocation: defaultLocation,
                        defaultDate: defaultDate,
                        showWeather: showWeather,
                        language: language,
                        notifications: notifications
                    }),
                    success: function(response) {
                        alert("Preferences updated successfully!");
                    },
                    error: function(error) {
                        console.error("Error updating preferences:", error);
                    }
                });
            });

            // Toggle display text based on the checkbox state
            $("#showWeather").change(function() {
                if ($(this).prop('checked')) {
                    $("#weatherLabel").text("Yes");
                } else {
                    $("#weatherLabel").text("No");
                }
            });

            function getNotificationSelection() {
                notifications = [];
                $("input[name='notifications']:checked").each(function() {
                    notifications.push($(this).val());
                });
                return notifications;
            }

            function getDefaultDateSelection() {
                const selectedOption = $('input[name="defaultDate"]:checked').val();
                // todo fix so not send actual date
                if (selectedOption === 'other') {
                    dateToSend =  $customDateInput.val();
                } else {
                    dateToSend= '';
                }

                return {
                    option: selectedOption, 
                    date: dateToSend   
                };
            }

            const $dateRadios = $('input[name="defaultDate"]');
            const $customDateInput = $('#customDate');
            let dateSelection={};
            $dateRadios.on('change', function() {
                const selectedOption = $('input[name="defaultDate"]:checked').val();
                let dateToSend='';
                if (selectedOption === 'other') {
                    $customDateInput.show();
                    $customDateInput.prop('required', true);
                    dateToSend = $customDateInput.val();
                } else {
                    $customDateInput.hide();
                    $customDateInput.prop('required', false);
                    $customDateInput.val('');
                }
                dateSelection = {
                    option: selectedOption,
                    date: dateToSend
                };
            });            

        });
    </script>
</body>
</html>
